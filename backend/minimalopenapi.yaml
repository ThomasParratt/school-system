openapi: 3.1.0

info:
  title: School API
  version: 1.0.0

servers:
  - url: http://localhost:3000

paths:

  /auth/login:
    post:
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }

      responses:
        "200":
          description: OK

  /users:
    get:
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK

    post:
      security:
        - bearerAuth: []
      requestBody:
        required: true
      responses:
        "201":
          description: Created

  /users/{id}:
    delete:
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
      responses:
        "200":
          description: Deleted